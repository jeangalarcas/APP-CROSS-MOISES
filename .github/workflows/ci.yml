name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x] # Atualizado para Node.js 24

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # Atualizado para v4
        with:
          version: 9 # Atualizado para pnpm 9 para compatibilidade com Node 24

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm -F backend lint
        continue-on-error: true

      - name: Lint admin
        run: pnpm -F admin lint
        continue-on-error: true

      - name: Lint aluno
        run: pnpm -F aluno lint
        continue-on-error: true

      - name: Build backend
        run: pnpm -F backend build

      - name: Build admin
        run: pnpm -F admin build

      - name: Build aluno
        run: pnpm -F aluno build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # Atualizado para v4
        with:
          version: 9 # Atualizado para pnpm 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x # Atualizado para Node.js 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  deploy-staging:
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: echo "Deploying to staging environment..."
        # Adicionar passos reais de deploy aqui

  deploy-production:
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: echo "Deploying to production environment..."
        # Adicionar passos reais de deploy aqui

